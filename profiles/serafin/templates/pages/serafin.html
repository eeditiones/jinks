<template>
    ---json
    {
        "templating": {
            "extends": "templates/layouts/content.html"
        },
        "script": {
            "extra-components": [
                "pb-leaflet-map"
            ],
            "custom": [
                "resources/scripts/toc.js",
                "resources/scripts/serafin-tabs.js"
            ]
        },
        "features": {
            "toc": {
                "enabled": false
            },
            "edition-navigation": {
                "navigation": true,
                "in-correspondence": true
            },
            "timeline": {
                "enabled": true,
                "document-view": true
            },
            "toolbar": {
                "navigation": false
            },
            "register": {
                "enabled": false
            }
        },
        "theme": {
            "layout": {
                "after": {
                    "collapsible": false
                }
            }
        }
    }
    ---
    [% template after %]
    [% if exists($context?doc) %]
    <div class="tab-panel">
        <span class="tab-title">People</span>
        <pb-view src="document1" subscribe="transcription" view="[[ $context?doc?view ]]" disable-history="">
            <pb-param name="mode" value="register"/>
            <pb-param name="category" value="people"/>
        </pb-view>
    </div>
    <div class="tab-panel">
        <span class="tab-title">Places</span>
        <pb-view src="document1" subscribe="transcription" view="[[ $context?doc?view ]]" disable-history="">
            <pb-param name="mode" value="register"/>
            <pb-param name="category" value="places"/>
        </pb-view>
        <!-- map lives in the Places tab; serafin-tabs.js calls invalidateSize()
             when this tab is shown so Leaflet renders at the right size -->
        <pb-leaflet-map id="map" zoom="11" subscribe="map">
            <pb-map-layer show="" base="" label="OpenTopo Map" url="https://{s}.tile.openstreetmap.de/tiles/osmde/{z}/{x}/{y}.png" max-zoom="19" attribution="© &lt;a href=&#34;https://www.openstreetmap.org/copyright&#34;&gt;OpenStreetMap&lt;/a&gt; contributors"/>
        </pb-leaflet-map>
    </div>
    [% endif %]
    [% endtemplate %]

    <header lang="pl">
        [[ page:transform($context?doc?content, map { "mode": "letter-head" }, $context?doc?odd || ".odd") ]]
    </header>
    <pb-view class="column1" src="document1" xpath="//text[@type = 'source']" column-separator=".tei-cb" append-footnotes="append-footnotes" subscribe="transcription" emit="transcription">[[ page:content($context, "//text[@type = 'source']") ]]</pb-view>
    <pb-view class="column2" src="document1" xpath="//text[@type = 'translation']" subscribe="transcription" column-separator=".tei-cb" append-footnotes="append-footnotes"/>
</template>
