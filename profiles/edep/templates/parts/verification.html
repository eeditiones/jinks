<details id="verification">
    <summary>
        <h2><pb-i18n key="form.verification">Verifizierung</pb-i18n></h2>
    </summary>
    <fx-group ref="fileDesc/titleStmt">
        <fx-repeat
          class="nested-repeat"
          ref="respStmt"
          id="r-verification">
            <template>
                <fx-group ref="resp">                   
                    <fx-control ref=".">
                        <label>
                            <pb-i18n key="form.basis-of-verification">Verifizierungsgrundlage</pb-i18n>
                        </label>
                        <select
                        class="widget"
                        ref="sortNames(instance('verification-options')//category)">
                            <template>
                                <option value="{@xml:id}">{catDesc[@xml:lang = $lang]}</option>
                            </template>
                        </select>
                    </fx-control>
                    <fx-control ref="@when" create="create">
                        <label>
                            <pb-i18n key="form.date-of-verification"/>
                        </label>
                        <input placeholder="YYYY-MM-DD" class="widget" />
                    </fx-control>
                </fx-group>

                <fx-control ref="persName">
                    <label>
                        <pb-i18n key="form.verification-by">Verifizierer</pb-i18n>
                    </label>
                </fx-control>
                
                <fx-trigger>
                    <pb-popover>
                        <svg class="icon icon-remove"><use href="#dash-circle"></use></svg>
                        <template slot="alternate">
                            <pb-i18n key="form.hint-delete-verification"></pb-i18n
                            ></template>
                    </pb-popover>
                    <fx-delete ref="."></fx-delete>
                </fx-trigger>
            </template>
        </fx-repeat>
        <fx-trigger class="add">
            <pb-popover>
                <svg class="icon icon-add"><use href="#plus-circle"></use></svg>
                <template slot="alternate">
                    <pb-i18n key="form.hint-add-verification"> </pb-i18n
                    ></template>
            </pb-popover>
            <fx-insert
                context="fileDesc/titleStmt"
                ref="respStmt"
                origin="instance('templates')//respStmt"></fx-insert>
        </fx-trigger>
    </fx-group>
</details>
