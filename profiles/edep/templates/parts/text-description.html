<details id="text-description">
    <!-- 
    
    METRE: select
    ?LANGUAGES: select + checkbox (if main language)
    ?LANGUAGE COMMENTS: free form
    PALEOGRAPHY: multiple checkboxes
    NOTE: text editor
    LIGATURE: select
    
    -->
    <summary>
        <h2><pb-i18n key="form.text-description"></pb-i18n></h2>
    </summary>
    <fx-group ref="ancestor::teiHeader/profileDesc" class="outer-group" aria-labelledby="profile-lbl">

        <fieldset>
            <legend>
                <pb-i18n key="form.language">Language(s)</pb-i18n>
            </legend>

            <fx-group ref="langUsage">
                <fx-trigger class="add">
                    <pb-popover>
                        <svg class="icon icon-add"><use href="#plus-circle"></use></svg>
                        <template slot="alternate">
                            <pb-i18n key="form.hint-add-language"/>
                        </template>
                    </pb-popover>
                    <fx-insert
                    context="."
                    ref="language"
                    origin="instance('templates')/language"></fx-insert>
                </fx-trigger>

                <fx-repeat
                class="nested-repeat repeat-flex"
                ref="language[@ident!='edep']"
                id="r-language">
                    <template>
                    <fx-group class="neutral">
                            <fx-control ref="@ident" create="create">
                                <label>
                                    <pb-i18n key="form.language"/>
                                </label>
                        <select
                    ref="instance('language-options')//category"
                            class="widget">
                                    <template>
                                        <!-- prettier-ignore -->
                                        <option value="{@xml:id}">{catDesc[@xml:lang = $lang]}</option>
                                    </template>
                                </select>
                            </fx-control>
                        <!-- TODO change into radio/checkbox -->

                        <fx-control ref="@ana" update-event="input" create="create">
                                <label>
                                    <pb-i18n key="form.languageScope"/>
                                </label>
                                <select
                                ref="instance('language-scope')//category"
                                class="widget">
                                <template>
                                    <!-- prettier-ignore -->
                                    <option value="{@xml:id}">{catDesc[@xml:lang = $lang]}</option>
                                </template>
                            </select>
                            </fx-control>
                        </fx-group>
                        <fx-trigger>
                            <pb-popover>
                                <svg class="icon icon-remove"><use href="#dash-circle"></use></svg>
                                <template slot="alternate">
                                    <pb-i18n key="form.hint-delete-language"/>
                                </template>
                            </pb-popover>
                            <fx-delete ref="."></fx-delete>
                        </fx-trigger>
                    </template>
                </fx-repeat>

                <fx-group ref="language[@ident='edep']">
                    <fx-control ref=".">
                        <label>
                            <pb-i18n key="form.languageFree"/>
                        </label>
                        <textarea class="widget"></textarea>

                    </fx-control>
                </fx-group>
            </fx-group>
        </fieldset>
    </fx-group>

    <fx-group ref="physDesc/objectDesc/layoutDesc/layout" id="layout" class="neutral">
        <!-- 24) -->
        <fx-control ref="note[@type='metre']" update-event="input">
            <label>
                <pb-i18n key="form.metre">Metrik</pb-i18n>
            </label>
            <select class="widget"
                ref="sortNames(instance('metre')//category)"
                selection="open">
                <template>
                    <!-- prettier-ignore -->
                    <option value="{@xml:id}">{catDesc[@xml:lang = $lang]}</option>
                </template>
            </select>
        </fx-control>

        <div class="alternatives">
            <fx-group ref="note[@type='paleography']" class="neutral">
                <fx-control
                ref="@corresp"
                create="create"
                update-event="input">
                    <label>
                        <pb-i18n key="form.paleography">Paläographie</pb-i18n>
                    </label>
                    <fx-items ref="instance('paleography')//category" class="widget">
                        <template>
                            <span class="fx-checkbox">
                                <input type="checkbox" value="{@corresp}"/>
                                <label>{catDesc[@xml:lang = $lang]}</label>
                            </span>
                        </template>
                    </fx-items>
                </fx-control>
                <fx-control
                id="input34"
                ref="."
                class="{instance('vars')/hide}"
                as="node"
                update-event="leave">
                    <label>
                        <pb-i18n key="form.free-form">freie Angabe</pb-i18n>
                    </label>
                    <edep-xml-editor
                    class="widget"
                    placeholder="[Inline text/markup or sequence of paragraphs]"
                    schema-root="provenance"
                    base-url="${app}"
                    data-template="lib:parse-params">
                    </edep-xml-editor>
                </fx-control>
            </fx-group>
        </div>
    </fx-group>

    <!-- 39) -->

    <fx-group ref="physDesc">
        <fx-group ref="handDesc" class="neutral">
            <fx-control ref="handNote[@scope='ligature']" update-event="input">
                <label>
                    <pb-i18n key="form.ligature">Ligatur</pb-i18n>
                </label>
                <select
                    ref="sortNames(instance('ligature')//category)"
                    class="widget">
                    <template>
                        <!-- prettier-ignore -->
                        <option value="{@corresp}">{catDesc[@xml:lang = $lang]}</option>
                    </template>
                </select>
            </fx-control>
        </fx-group>
    </fx-group>
</details>
