<details id="images" class="group-6">
    <summary>
        <h3>
            <span class="form-hint-wrap">
                <pb-i18n key="form.images-dps">Bilder (Fotos, Zeichnungen, Abklatsche)</pb-i18n>
                <span class="hint-trigger hint-trigger--passive" tabindex="0" role="button" aria-label="Help">
                    <svg class="icon icon-info"><use href="#info-circle"></use></svg>
                </span>
                <div class="form-hint" popover="manual" role="tooltip">
                    <pb-i18n key="form.hint-images"></pb-i18n>
                </div>
            </span>
        </h3>
    </summary>
    <!-- 35c) Bilder: Verweis auf Literatur, in der Abbildung vorhanden -->
    <fx-repeat
      class="nested-repeat"
      id="r-images"
      ref="listBibl[@type='images']/bibl">
        <template>
            <div>
                <div class="output">
                    <label>
                        <pb-i18n key="form.biblio-abbreviation"
                        >Kürzel</pb-i18n
                        ></label
                    >
                    <div>
                        <fx-trigger>
                            <svg class="icon icon-copy widget"><use href="#clipboard"></use></svg>
                            <fx-call function="clipboard(@corresp)"></fx-call>
                        </fx-trigger>
                    </div>
                                        <span class="form-hint-wrap">
                        <button type="button" class="hint-trigger" aria-label="Help">
                            <svg class="icon icon-info"><use href="#info-circle"></use></svg>
                        </button>
                        <div class="form-hint" popover="manual" role="tooltip">
                            <pb-i18n key="form.hint-biblio-abbreviation"
                                                        >XML:ID</pb-i18n
                                                        >
                        </div>
                    </span>
                </div>
                <fx-control ref="@corresp" update-event="change" create="create">
                    <label>
                        <pb-i18n key="form.reference">Referenz</pb-i18n>
                    </label>
                    <zotero-autocomplete
                        class="widget"
                        endpoint="{instance('vars')/appdir}/api/zotero/items/suggest"
                        limit="8"
                        minlength="2"
                        debounce="250"
                        wait-ready="true">
                    </zotero-autocomplete>
                </fx-control>
                <fx-control ref="citedRange">
                    <label>
                        <pb-i18n key="form.cited-range">Cited Range</pb-i18n>
                    </label>
                </fx-control>
                <div>
                    <fx-control ref="note" as="node" update-event="leave">
                        <label>
                            <pb-i18n key="form.notes">Anmerkungen</pb-i18n>
                                                        <span class="form-hint-wrap">
                                <button type="button" class="hint-trigger" aria-label="Help">
                                    <svg class="icon icon-info"><use href="#info-circle"></use></svg>
                                </button>
                                <div class="form-hint" popover="manual" role="tooltip">
                                    <pb-i18n key="form.notes">Notes</pb-i18n>
                                </div>
                            </span>
                        </label>
                        <edep-xml-editor
                          class="widget"
                          schema-root="note"
                          placeholder="[Inline text/markup or sequence of paragraphs]"
                          base-url="${app}"
                          data-template="lib:parse-params">
                        </edep-xml-editor>
                    </fx-control>
                </div>
            </div>
            <fx-trigger>
                <svg class="icon icon-remove"
                  title="delete image"><use href="#dash-circle"></use></svg>
                <fx-delete ref="."></fx-delete>
                <fx-refresh control="r-images"></fx-refresh>
            </fx-trigger>
        </template>
    </fx-repeat>
    <fx-trigger
        class="add"
        title="Bilder (Fotos, Zeichnungen, Abklatsche) hinzufügen">
        <svg class="icon icon-add"><use href="#plus-circle"></use></svg>
        <fx-action>
            <fx-insert
                context="listBibl[@type='images']"
                ref="bibl"
                origin="instance('templates')//listBibl[@type='images']/bibl"></fx-insert>
            <fx-refresh control="r-images"></fx-refresh>
        </fx-action>
    </fx-trigger>
</details>
