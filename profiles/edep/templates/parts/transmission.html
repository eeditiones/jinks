<details id="transmission" class="group-6">
    <summary>
        <h3><pb-i18n key="form.transmission">Überlieferung</pb-i18n></h3>
        <pb-popover>
            <svg class="icon icon-info"><use href="#info-circle"></use></svg>
            <template slot="alternate">
                <pb-i18n key="form.hint-recorded-location"></pb-i18n>
            </template>
        </pb-popover>
    </summary>

    <!-- 12c) Überlieferung -->
    <fx-repeat
        class="nested-repeat"
        id="r-transmission"
        ref="listBibl[@type='transmission']/bibl">
        <template>
            <div>
                <div class="output">
                    <label>
                        <pb-i18n key="form.biblio-abbreviation"
                        >Kürzel
                        </pb-i18n
                        >
                    </label
                    >
                    <div>
                        <fx-trigger>
                            <svg class="icon icon-copy widget"><use href="#clipboard"></use></svg>
                            <fx-call function="clipboard(@corresp)"></fx-call>
                        </fx-trigger>
                    </div>
                    <pb-popover>
                        <svg class="icon icon-info"><use href="#info-circle"></use></svg>
                        <template slot="alternate">
                            <pb-i18n key="form.hint-biblio-abbreviation"
                            >XML:ID
                            </pb-i18n
                            >
                        </template>
                    </pb-popover>
                </div>
                <fx-control create="create" ref="@corresp" update-event="change">
                    <label>
                        <pb-i18n key="form.reference">Referenz</pb-i18n>
                    </label>
                    <zotero-autocomplete
                        class="widget"
                        debounce="250"
                        endpoint="{instance('vars')/appdir}/api/zotero/items/suggest"
                        limit="8"
                        minlength="2"
                        wait-ready="true">
                    </zotero-autocomplete>
                </fx-control>
                <fx-control ref="citedRange">
                    <label>
                        <pb-i18n key="form.cited-range">Cited Range</pb-i18n>
                    </label>
                </fx-control>

                <div>
                    <fx-control as="node" ref="note" update-event="leave">
                        <label>
                            <pb-i18n key="form.notes">Anmerkungen</pb-i18n>
                        </label>
                        <edep-xml-editor
                            base-url="${app}"
                            class="widget"
                            data-template="lib:parse-params"
                            placeholder="[Inline text/markup or sequence of paragraphs]"
                            schema-root="note">
                        </edep-xml-editor>
                    </fx-control>
                </div>
            </div>
            <fx-trigger>
                <svg class="icon icon-remove"
                    title="Überlieferung löschen"><use href="#dash-circle"></use></svg>
                <fx-delete ref="."></fx-delete>
                <fx-refresh control="r-transmission"></fx-refresh>
            </fx-trigger>
        </template>
    </fx-repeat>
    <fx-trigger class="add" title="Überlieferung hinzufügen">
        <svg class="icon icon-add"
            title="Überlieferung hinzufügen"><use href="#plus-circle"></use></svg>
        <fx-insert
            context="listBibl[@type='transmission']"
            ref="bibl"
            origin="instance('templates')//bibl"></fx-insert>
        <fx-refresh control="r-transmission"></fx-refresh>
    </fx-trigger>
</details>
