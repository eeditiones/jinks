<details id="prev-editions" class="group-6">
    <summary>
        <h3><pb-i18n key="form.previous-editions">Ältere Editionen</pb-i18n></h3>
        <pb-popover>
            <iron-icon icon="info-outline"></iron-icon>
            <template slot="alternate">
                <pb-i18n key="form.hint-previous-editions"></pb-i18n>
            </template>
        </pb-popover>
    </summary>
    <!-- 35a) Ältere Editionen -->
    <fx-repeat
      class="nested-repeat"
      id="r-editions"
      ref="listBibl[@type='previousEditions']/bibl">
        <template>
            <div>
                <div class="output">
                    <label>
                        <pb-i18n key="form.biblio-abbreviation"
                        >Kürzel</pb-i18n
                        ></label
                    >
                    <div>
                        <fx-trigger>
                            <iron-icon
                              class="widget"
                              icon="icons:content-copy"></iron-icon>
                            <fx-call function="clipboard(@corresp)"></fx-call>
                        </fx-trigger>
                    </div>
                    <pb-popover>
                        <iron-icon icon="info-outline"></iron-icon>
                        <template slot="alternate">
                            <pb-i18n key="form.hint-biblio-abbreviation"
                            >XML:ID</pb-i18n
                            >
                        </template>
                    </pb-popover>
                </div>
                <fx-control ref="@corresp" update-event="change" create="create">
                    <label>
                        <pb-i18n key="form.reference">Referenz</pb-i18n>
                    </label>
                    <zotero-autocomplete
                        class="widget"
                        endpoint="{instance('vars')/appdir}/api/zotero/items/suggest"
                        limit="8"
                        minlength="2"
                        debounce="250"
                        wait-ready="true">
                    </zotero-autocomplete>
                </fx-control>
                <fx-control ref="citedRange">
                    <label>
                        <pb-i18n key="form.cited-range">Cited Range</pb-i18n>
                    </label>
                </fx-control>
                <div>
                    <fx-control ref="note" as="node" update-event="leave">
                        <label>
                            <pb-i18n key="form.notes">Anmerkungen</pb-i18n>
                            <pb-popover>
                                <iron-icon icon="info-outline" />
                                <template slot="alternate">
                                    <pb-i18n key="form.notes">Hint</pb-i18n>
                                </template>
                            </pb-popover>
                        </label>
                        <edep-xml-editor
                          class="widget"
                          placeholder="[Inline text/markup or sequence of paragraphs]"
                          schema-root="note"
                          base-url="${app}"
                          data-template="lib:parse-params">
                        </edep-xml-editor>
                    </fx-control>
                </div>
            </div>

            <fx-trigger>
                <iron-icon
                  icon="remove-circle-outline"
                  title="delete Bibliographie"></iron-icon>
                <fx-delete ref="."></fx-delete>
                <fx-refresh control="r-editions"></fx-refresh>
            </fx-trigger>
        </template>
    </fx-repeat>
    <fx-trigger class="add" title="Ältere Edition hinzufügen">
        <iron-icon icon="add-circle-outline"></iron-icon>

        <fx-insert
            context="listBibl[@type='previousEditions']"
            ref="bibl"
            origin="instance('templates')//bibl"></fx-insert>
        <fx-refresh control="r-editions"></fx-refresh>
    </fx-trigger>
</details>
