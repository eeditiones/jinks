<template>
---json
{
    "templating": {
        "extends": "templates/edep-base.html"
    },
    "styles": [
        "resources/css/edep-theme.css"
    ],
    "features": {
        "forms": {
            "enabled": true
        }
    }
}
---
[% template fore-prolog %]
    <fx-action event="visibilitychange" target="#document">
        <fx-message>document focus {event('target.visibilityState')}</fx-message>
    </fx-action>

    <fx-action event="ready" if="exists(instance('query')/id)">
        <fx-send submission="s-load"></fx-send>
        <fx-setfocus control="findspot"></fx-setfocus>
    </fx-action>

    <fx-model>
        <fx-action event="model-construct-done">
            <fx-send submission="s-login"></fx-send>
            <!-- TODO: is this needed? The `if` is needed, otherwise a different endpoint may be called -->
            <fx-send submission="s-load" if="exists(instance('query')/id)"></fx-send>
        </fx-action>

        <fx-instance src="templates/fore/place-tmpl.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
            <data></data>
        </fx-instance>
        <fx-bind ref="placeName[@type='findspot']" required="true()"></fx-bind>

        <fx-instance id="vars">
            <data>
                <loggedin>hidden</loggedin>
                <language>en</language>
                <place lang="en">Place has been stored</place>
                <place lang="de">Ort wurde gespeichert</place>
            </data>
        </fx-instance>
        <fx-bind ref="instance('vars')/loggedin" relevant=".='true'"></fx-bind>

        <fx-instance id="query" src="#querystring">
            <data></data>
        </fx-instance>

        <fx-instance id="province" src="[[ $context-path ]]/data/taxonomy/province.xml"
            xpath-default-namespace="http://www.tei-c.org/ns/1.0"></fx-instance>

        <fx-instance id="country" src="[[ $context-path ]]/data/taxonomy/country.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
            <data></data>
        </fx-instance>

        <fx-submission id="s-save" method="post" url="[[ $context-path ]]/api/places/{instance('query')/id}" replace="instance">
            <fx-action event="submit-done">
                <fx-message>{instance('vars')/place[@lang=instance('vars')/language]}</fx-message>
                <fx-unmodified></fx-unmodified>
            </fx-action>
            <fx-message event="submit-error">couldn't be saved</fx-message>
        </fx-submission>
        <fx-submission id="s-load" method="get" url="[[ $context-path ]]/api/places/{instance('query')/id}" replace="instance"
            validate="false"></fx-submission>

        <fx-submission id="s-reset" url="templates/fore/place-tmpl.xml" replace="instance">
        </fx-submission>

        <fx-instance id="login" type="json">{}</fx-instance>
        <fx-submission id="s-login" ref="instance('login')?*" url="[[ $context-path ]]/api/login" method="post" replace="instance"
            instance="login" validate="false">
            <fx-setvalue ref="instance('vars')/loggedin" event="submit-error">false</fx-setvalue>
            <fx-setvalue ref="instance('vars')/loggedin" event="submit-done">true</fx-setvalue>
        </fx-submission>

        <fx-function signature="shortlang($input as xs:string,$default as xs:string) as xs:string"
            type="text/javascript">
            if($input) { return $input.substring(0, 2); } return $default;
        </fx-function>
    </fx-model>

    <fx-var name="lang" value="instance('vars')/language"></fx-var>

    <fx-action event="pb-i18n-update" target="#document">
        <fx-setvalue ref="instance('vars')/language"
            value="shortlang(event('language'), instance('vars')/language/string())"></fx-setvalue>
        <fx-refresh force="force"></fx-refresh>
    </fx-action>
[% endtemplate %]

    <fx-output ref="instance('default')/place/@xml:id"></fx-output>
    <fieldset class="case-content">
        <legend>
            <pb-i18n key="place.place"></pb-i18n>
        </legend>
        <fx-control ref="placeName[@type='findspot']" id="findspot">
            <label>
                <span class="form-hint-wrap">
                    <pb-i18n key="form.context-of-provenance">Fundstelle</pb-i18n>
                    <button type="button" class="hint-trigger" aria-label="Help">
                        <svg class="icon icon-info"><use href="#info-circle"></use></svg>
                    </button>
                    <div class="form-hint" popover="manual" role="tooltip">
                        <pb-i18n key="form.hint-geodata-findspot"></pb-i18n>
                    </div>
                </span>
            </label>
            <input type="text" autofocus="autofocus" class="widget" tabindex="1" />
        </fx-control>
        <fx-control ref="placeName[@type='ancient']">
            <label>
                <pb-i18n key="form.site-ancient-name"></pb-i18n>
            </label>
        </fx-control>
        <fx-control ref="region[@type='province']" update-event="input">
            <label>
                <pb-i18n key="form.site-ancient-province"></pb-i18n>"{./@xml:id}"
            </label>
            <select ref="instance('province')//category" class="widget" selection="open">
                <template>
                    <option value="{@xml:id}">{catDesc}</option>
                </template>
            </select>
        </fx-control>
        <fx-control ref="placeName[@type='modern']">
            <label>
                <span class="form-hint-wrap">
                    <pb-i18n key="form.site-modern-name">Fundort (modern)</pb-i18n>
                    <button type="button" class="hint-trigger" aria-label="Help">
                        <svg class="icon icon-info"><use href="#info-circle"></use></svg>
                    </button>
                    <div class="form-hint" popover="manual" role="tooltip">
                        <pb-i18n key="form.hint-geodata-findspot-modern"></pb-i18n>
                    </div>
                </span>
            </label>
        </fx-control>
        <fx-control ref="region[@type='modern']">
            <label>
                <pb-i18n key="form.site-modern-region"></pb-i18n>
            </label>
        </fx-control>
        <fx-control ref="country" update-event="input">
            <label>
                <pb-i18n key="form.site-modern-country"></pb-i18n>
            </label>
            <select ref="instance('country')//category" class="widget" selection="open">
                <template>
                    <option value="{@xml:id}">{catDesc[@xml:lang = $lang]}</option>
                </template>
            </select>
        </fx-control>
        <fx-control ref="location/geo">
            <label>
                <pb-i18n key="place.geolocation"></pb-i18n>
            </label>
        </fx-control>
        <fx-control ref="ptr[@type='pleiades']">
            <label>Pleiades</label>
        </fx-control>
        <fx-control ref="ptr[@type='geonames']">
            <label>Geonames</label>
        </fx-control>
    </fieldset>
[% template footer %]
    <footer>
        <fx-trigger class="saveBtn" debounce="1000">
            <button>
                <pb-i18n key="form.save"></pb-i18n>
            </button>
            <fx-action>
                <fx-send submission="s-login"></fx-send>
                <fx-send submission="s-save"></fx-send>
            </fx-action>
        </fx-trigger>
        <a href="place">
            <pb-i18n key="form.new"></pb-i18n>
        </a>
        <a href="[[ $context-path ]]/places">
            <pb-i18n key="form.list"></pb-i18n>
        </a>
    </footer>
[% endtemplate %]
</template>
