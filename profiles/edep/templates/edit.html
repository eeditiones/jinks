<template>
    ---json
    {
        "templating": {
            "extends": "templates/layouts/content.html"
        },
        "scripts": [
            "resources/scripts/zotero-autocomplete.js",
            "resources/scripts/edep-xml-editor.js"
        ],
        "features": {
            "forms": {
                "enabled": true
            }
        }
    }
    ---
    <fx-fore show-confirmation="show-confirmation" id="epidoc-editor" create-nodes="create-nodes">
        <fx-model>
            <fx-action event="model-construct-done">
                <fx-send submission="s-login" if="instance('vars')/loggedin != 'true'"></fx-send>
                <!-- ### if get called with an id param we load the data via submission ### -->
                <fx-send
                    submission="s-load-inscription"
                    if="exists(instance('params')/id)"></fx-send>
                <fx-setvalue ref="instance('vars')/inited">true</fx-setvalue>
                <fx-send submission="s-load-fragments"></fx-send>
            </fx-action>

            <fx-instance
                id="default"
                src="templates/fore/epidoc-template.xml"
                xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="i-fragment" xpath-default-namespace="http://www.tei-c.org/ns/1.0"></fx-instance>
            <fx-submission id="s-load-template"
                           method="get"
                           url="[[ $context-path ]]/templates/fore/epidoc-template.xml"
                           replace="instance"
                           instance="i-fragment"
                           validate="false">
                <fx-action event="submit-done">
                    <fx-setvalue ref="instance('i-fragment')/@corresp" value="instance('default')/@xml:id"></fx-setvalue>
                    <fx-setvalue ref="instance('i-fragment')/@type" value="'partial'">partial</fx-setvalue>
                    <fx-setvalue ref="instance('i-fragment')/@xml:id" value="concat(instance('default')/@xml:id,'-')"></fx-setvalue>
                </fx-action>
            </fx-submission>
            <fx-instance id="i-fragments" type="json"></fx-instance>
            <fx-submission id="s-load-fragments"
                           method="get"
                           url="[[ $context-path ]]/api/fragments?id={instance('default')/@xml:id}"
                           replace="instance" instance="i-fragments" validate="false"></fx-submission>
            <fx-submission
                id="s-create-fragment"
                url="[[ $context-path ]]/api/inscription?collection={instance('params')/collection}"
                method="post"
                ref="instance('i-fragment')"
                replace="instance"
                instance="i-fragment">
                <fx-message event="submit-done">
                    <pb-i18n key="form.data-saved"></pb-i18n>
                </fx-message>
                <fx-action event="submit-error">
                    <fx-message>
                        <pb-i18n key="form.save-failed"></pb-i18n>
                    </fx-message>
                    <fx-action src="resources/scripts/showErrors.js"></fx-action>
                </fx-action>
            </fx-submission>
            <fx-bind ref="instance('default')">
                <fx-bind ref="teiHeader">
                    <fx-bind
                        ref="fileDesc/titleStmt/title"
                        required="true()"
                        constraint="string-length(.) &gt; 0">
                    </fx-bind>
                    <fx-bind ref="fileDesc/sourceDesc/msDesc/history">
                        <fx-bind ref="provenance">
                            <fx-bind ref="./@when" constraint="checkDate(.)"></fx-bind>
                            <fx-bind ref="./@notBefore" constraint="checkDate(.)"></fx-bind>
                            <fx-bind ref="./@notAfter" constraint="checkDate(.)"></fx-bind>
                        </fx-bind>
                        <fx-bind ref="origin/origDate">
                            <fx-bind ref="./@when-custom" constraint="checkDate(.)"></fx-bind>
                            <fx-bind ref="./@notBefore-custom" constraint="checkDate(.)"></fx-bind>
                            <fx-bind ref="./@notAfter-custom" constraint="checkDate(.)"></fx-bind>
                        </fx-bind>
                    </fx-bind>
                </fx-bind>
            </fx-bind>

            <fx-instance id="typeins" src="[[ $context-path ]]/data/taxonomy/typeins.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="objtyp" src="[[ $context-path ]]/data/taxonomy/objtyp.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="material" src="[[ $context-path ]]/data/taxonomy/material.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="paleography" src="[[ $context-path ]]/data/taxonomy/paleography.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="editor-roles" src="[[ $context-path ]]/data/taxonomy/editor-roles.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="language-options" src="[[ $context-path ]]/data/taxonomy/languages.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="language-scope" src="[[ $context-path ]]/data/taxonomy/language-scope.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="decoration" src="[[ $context-path ]]/data/taxonomy/decor.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="metre" src="[[ $context-path ]]/data/taxonomy/metre.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="ligature" src="[[ $context-path ]]/data/taxonomy/ligature.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="verification-options" src="[[ $context-path ]]/data/taxonomy/verification.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="publication-status" src="[[ $context-path ]]/data/taxonomy/publication-status.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="preservation" src="[[ $context-path ]]/data/taxonomy/preservation.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="religion" src="[[ $context-path ]]/data/taxonomy/religion.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="document-type" src="[[ $context-path ]]/data/taxonomy/document-type.xml" xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance
                id="templates"
                src="[[ $context-path ]]/templates/fore/templates.xml"
                xpath-default-namespace="http://www.tei-c.org/ns/1.0">
                <data></data>
            </fx-instance>

            <fx-instance id="vars" shared="true">
                <data>
                    <appdir>${app}</appdir>
                    <display-leiden>hidden</display-leiden>
                    <can-delete>false</can-delete>
                    <parent></parent>
                    <uuid></uuid>
                    <geoid></geoid>
                    <loggedin>hidden</loggedin>
                    <xml-valid>true</xml-valid>
                    <history-term></history-term>
                    <geography-term></geography-term>
                    <military-term></military-term>
                    <language>en</language>
                    <inited>false</inited>
                    <is-fragment>false</is-fragment>
                </data>
            </fx-instance>
            <!-- todo: remove static readonly once new fragment functionality is completely done -->
            <fx-bind ref="instance('vars')/is-fragment"
                     relevant="not(exists(instance('default')/@type))"
                     readonly="true()"></fx-bind>
            <fx-bind ref="instance('vars')/can-delete" relevant="index('parts') gt 1"></fx-bind>
            <fx-bind ref="instance('vars')/loggedin" relevant=".='true'"></fx-bind>
            <fx-bind
                ref="instance('vars')/xml-valid"
                calculate="editorsValid()"
                constraint=".='true'"></fx-bind>

            <fx-instance id="tmp">
                <data>
                    <dummy>xpath?</dummy>
                </data>
            </fx-instance>

            <!-- this instance holds queryString params from the Url of this page -->
            <fx-instance id="params">
                <data>
                    <id>[[ page:parameter($context, 'id') ]]</id>
                    <collection>[[ page:parameter($context, 'collection') ]]</collection>
                    <app>[[ page:parameter($context, 'app') ]]</app>
                </data>
            </fx-instance>

            <fx-submission
                id="s-load-inscription"
                url="[[ $context-path ]]/api/inscription?id={instance('params')/id}&amp;collection={instance('params')/collection}"
                method="get"
                replace="instance"
                validate="false">
                <fx-message event="submit-error">
                    <pb-i18n key="loading-failed"></pb-i18n>
                </fx-message>

                <fx-action event="submit-done">
                    <!--
                        ### initializing state for 30) 31) 32) dummy switches
                    -->
                    <fx-setvalue
                        ref="instance('vars')/history-term"
                        value="if(exists(instance('default')//term[@ref='#social-economic-legal-history'])) then 'true' else 'false'"></fx-setvalue>

                    <fx-setvalue
                        ref="instance('vars')/geography-term"
                        value="if(exists(instance('default')//term[@ref='#geography'])) then 'true' else 'false'"></fx-setvalue>

                    <fx-setvalue
                        ref="instance('vars')/military-term"
                        value="if(exists(instance('default')//term[@ref='#military'])) then 'true' else 'false'"></fx-setvalue>
                </fx-action>
            </fx-submission>

            <fx-submission
                id="s-create"
                url="[[ $context-path ]]/api/inscription?collection={instance('params')/collection}"
                method="post"
                replace="instance">
                <fx-message event="submit-done">
                    <pb-i18n key="form.data-saved"></pb-i18n>
                </fx-message>
                <fx-action event="submit-error">
                    <fx-message>
                        <pb-i18n key="form.save-failed"></pb-i18n>
                    </fx-message>
                    <fx-action src="resources/scripts/showErrors.js"></fx-action>
                </fx-action>
            </fx-submission>

            <fx-submission
                id="s-save"
                url="[[ $context-path ]]/api/inscription?id={instance('params')/id}&amp;collection={instance('params')/collection}"
                method="post"
                replace="instance">
                <fx-message event="submit-done">
                    <pb-i18n key="form.data-saved"></pb-i18n>
                </fx-message>
                <fx-action event="submit-error">
                    <fx-message>
                        <pb-i18n key="form.save-failed"></pb-i18n>
                    </fx-message>
                    <fx-action src="resources/scripts/showErrors.js"></fx-action>
                </fx-action>
            </fx-submission>

            <fx-function signature="gen-id() as xs:string" type="text/javascript">
                return createUUID();
            </fx-function>

            <fx-instance id="login" type="json">{}</fx-instance>
            <fx-submission
                id="s-login"
                ref="instance('login')?*"
                url="[[ $context-path ]]/api/login"
                method="post"
                replace="instance"
                instance="login"
                validate="false">
                <fx-setvalue ref="instance('vars')/loggedin" event="submit-error"
                    >false</fx-setvalue
                >
                <fx-setvalue ref="instance('vars')/loggedin" event="submit-done">true</fx-setvalue>
            </fx-submission>

            <fx-function signature="editorsValid() as xs:boolean" type="text/javascript">
                const editors =
                form.querySelectorAll('jinn-xml-editor[valid="false"],jinn-epidoc-editor[valid="false"]');
                if(editors.length !== 0){ return false; }else{ return true; }
            </fx-function>

            <fx-function
                signature="shortlang($input as xs:string,$default as xs:string) as xs:string"
                type="text/javascript">
                if($input) { return $input.substring(0, 2); } return $default;
            </fx-function>

            <fx-function
                signature="checkDate($value as xs:string) as xs:boolean"
                type="text/javascript">
                return checkDate($value);
            </fx-function>
            <fx-function
                signature="sortNames($terms as element()*) as element()*"
                type="text/xquery">
                let $lang := instance('vars')/language for $term in $terms order by
                $term/catDesc[@xml:lang = $lang] return $term
            </fx-function>
            <fx-function
                signature="sortLang($langs as element()*) as element()*"
                type="text/xquery">
                for $term in $langs order by $term return $term
            </fx-function>
            <fx-function
                signature="computeBiblId($bibls as element()*) as xs:string"
                type="text/xquery">
                max(( 0, for $bibl in $bibls/@xml:id where starts-with($bibl, 'bibl-') return
                xs:int(substring-after($bibl, 'bibl-')) )) + 1
            </fx-function>
            <fx-function
                signature="clipboard($value as xs:string) as xs:string"
                type="text/javascript">
                console.log($value); navigator.clipboard.writeText($value); return $value;
            </fx-function>
            <fx-function
                signature="scrollto($selector as xs:string) as xs:string"
                type="text/javascript">
                const found = document.querySelector($selector); if(found){
                found.scrollIntoView({block: "start", inline: "nearest", behavior:"smooth"}); }
            </fx-function>
            <!--
                <fx-function signature="expander() as xs:boolean" type="text/javascript">
                const expander = document.querySelector('#expander');
                const details = document.querySelectorAll('details');

                if(expander.classList.contains('expanded')){
                Array.from(details).foreach(d => {
                details.removeAttribute('open');
                });
                }else{
                Array.from(details).foreach(d => {
                details.setAttribute('open','open');
                expander.classList.addClass('expanded');
                });
                }
                return true;
                </fx-function>
            -->
        </fx-model>
        <fx-action event="pb-i18n-update" target="#document">
            <fx-setvalue
                ref="instance('vars')/language"
                value="shortlang(event('language'), instance('vars')/language/string())"></fx-setvalue>
            <fx-refresh force="force"></fx-refresh>
        </fx-action>

        <fx-var name="lang" value="instance('vars')/language"></fx-var>

        <nav aria-labelledby="navigation">
            <div class="toolbar">
                <button class="expander" onclick="expandAll()" title="expand all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">

                            <path d="M8 9 L12 5 L16 9" />
                            <!-- down chevron -->
                            <path d="M8 15 L12 19 L16 15" />
                        </g>

                </button>
                <button class="expander" title="collapse all" onclick="closeAll()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">

                            <path d="M8 5 L12 9 L16 5" />
                            <!-- bottom chevron (now pointing up) -->

                        <pb-i18n key="form.object">Objekt</pb-i18n>
                    </a>
                    <button id="expander" onclick="expander()">&lt; &gt;</button>
                </li>

                <!-- if corresp then partial document, otherwise, composite -->

                        <li>
                            <a
                                href="{uri-path()}#object">
                                <pb-i18n key="form.identifier">Identifier</pb-i18n>

        <fx-group ref="teiHeader" aria-labelledby="title-lbl" class="outer-group">
            <h1 id="title-lbl">
                <fx-control id="edeptitle" class="title" ref="fileDesc/titleStmt/title">
                    <label>
                        <pb-i18n key="form.title"></pb-i18n>
                    </label>
                </fx-control>
            </h1>


            <!-- IDENTIFIERs -->
            [% include "templates/parts/object.html" %]

            <fx-group
                ref="fileDesc/sourceDesc/msDesc"
                id="inscription"

                <!-- FINDSPOT -->
                [% include "templates/parts/findspot.html" %]

                [% include "templates/parts/location.html" %]

                <!-- VERIFICATION -->
                [% include "templates/parts/verification.html" %]
            </fx-group>
            <fx-group
                ref="fileDesc/sourceDesc/msDesc"
                id="objdesc"
                class="neutral">
                <!-- OBJECT DESCRIPTION -->
                [% include "templates/parts/objectdesc.html" %]

                [% include "templates/parts/inscription-field.html" %]

                <!-- TEXT DESCRIPTION -->
                [% include "templates/parts/text-description.html" %]
            </fx-group>

            <fx-group ref="profileDesc" class="outer-group" aria-labelledby="profile-lbl">

                    data-template-replace="true"></div>
            </fx-group> -->


            <!-- REFERENCES -->
            <fx-group id="references" class="references-background">
                <fx-group ref="fileDesc/sourceDesc/listBibl" class="outer-group">
                    <h2>
                        <pb-i18n key="form.references"/>
                        <pb-popover>
                            <iron-icon icon="info-outline"></iron-icon>
                            <template slot="alternate">
                                <pb-i18n key="form.hint-references"></pb-i18n>
                            </template>
                        </pb-popover>
                    </h2>

                    [% include "templates/parts/prev-editions.html" %]

                    [% include "templates/parts/images.html" %]
                </fx-group>

                <!-- DIGITAL IMAGES -->
                <fx-group id="dig-images" class="neutral">

                </fx-group>
            </fx-group>
        </fx-group>

        <!-- edition here, splitting the binding group -->
        <!-- EDITION and COMMENTARY together as they are all stored in BODY -->
        <fx-group ref="text/body" class="outer-group">
            [% include "templates/parts/edition.html" %]
