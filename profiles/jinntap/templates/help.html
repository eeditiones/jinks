<template>
    ---json
    {
        "templating": {
            "extends": "templates/layouts/content.html"
        },
        "features": {
            "jinntap": {
                "toolbar-button": true
            },
            "annotate": {
                "toolbar-button": false
            },
            "toolbar": {
                "navigation": false
            }
        }
    }
    ---
    <!-- Basic template for a page with a single document -->
    <div class="center">
        <pb-view src="document1" column-separator=".tei-cb" append-footnotes="append-footnotes"
            subscribe="transcription" emit="transcription" direction="[[$context?defaults?direction]]" />
    </div>
</template>
