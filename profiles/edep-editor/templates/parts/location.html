<details id="location">
    <summary>
        <h2>
            <pb-i18n key="form.last-recorded-location"></pb-i18n>
            <span class="form-hint-wrap">
                <button type="button" class="hint-trigger" aria-label="Help">
                    <svg class="icon icon-info">
                        <use href="#info-circle"></use>
                    </svg>
                </button>
                <div class="form-hint" popover="manual" role="tooltip">
                    <pb-i18n key="form.hint-last-location">Aufbewahrungsort</pb-i18n>
                </div>
            </span>
        </h2>
    </summary>
    <fx-group ref="msIdentifier" class="neutral form-grid">
        <fx-control ref="repository">
            <label>
                <pb-i18n key="form.last-recorded-location"/>
            </label>
            <textarea class="widget"></textarea>
        </fx-control>

        <fx-control ref="repository/@key" create="create">
            <label>
                <pb-i18n key="form.repository"/>
            </label>
        </fx-control>
        <fx-control ref="idno[@type='inventory']" class="form-grid">
            <label>
                <pb-i18n key="form.repository-number"/>
            </label>
        </fx-control>
    </fx-group>

    <!-- 12b) -->
    <div class="with-hint">
        <fx-control
          ref="history/provenance[@type='history']"
          as="node"
          update-event="leave">
            <label>
                <pb-i18n key="form.other-events"/>
                <span class="form-hint-wrap">
                    <button type="button" class="hint-trigger" aria-label="Help">
                        <svg class="icon icon-info"><use href="#info-circle"></use></svg>
                    </button>
                    <div class="form-hint" popover="manual" role="tooltip">
                        <pb-i18n key="form.other-events"></pb-i18n>
                    </div>
                </span>

            </label>
            [% include "templates/parts/xml-editor-provenance.html" %]
        </fx-control>
    </div>
</details>
