# Reverse proxy that serves the TEI Publisher app from the site root.
#
# The app normally lives at /exist/apps/tei-publisher/. By rewriting the root
# onto that collection and sending an X-Forwarded-Host header, the app's
# $config:context-path resolves to "" (see
# profiles/base10/modules/generated-config.tpl.xql), so all in-app URLs
# (/api/..., /resources/..., /sitemap.xml, /robots.txt) become root-relative.
#
# If your app was generated under a different abbrev, change the path in the
# proxy_pass and proxy_redirect lines below.

upstream existdb {
    # eXist running on the Docker host. host.docker.internal resolves to the
    # host on Docker Desktop; on Linux it is wired up via extra_hosts in
    # docker-compose.yml.
    server host.docker.internal:8080;
}

server {
    listen 80;
    server_name localhost;

    location / {
        # Prepend the app prefix to the *raw* request URI. Using $request_uri
        # (rather than a static URI in proxy_pass) means nginx forwards the URI
        # exactly as received, without decoding or normalizing it. This is
        # essential for OpenAPI path parameters that contain encoded slashes,
        # e.g. /api/document/doc%2Fquickstart.xml/contents — a static proxy_pass
        # would decode %2F to "/" and break the route.
        proxy_pass http://existdb/exist/apps/tei-publisher$request_uri;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;

        # Rewrite any absolute redirects emitted by eXist's controller back to root.
        proxy_redirect /exist/apps/tei-publisher/ /;
        proxy_redirect http://$host/exist/apps/tei-publisher/ /;
    }
}
